<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Composição da Remuneração por Estado</title>
<style>
  :root {
    color-scheme: light dark;
    --cor-borda: #dde1e7;
    --cor-destaque: #1f2a44;
    --cor-linha-alt: #f0f1f3;
  }
  * { box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    margin: 0;
    padding: 32px 24px;
    background: #e9ebef;
    color: #1a1f2b;
  }
  h1 { font-size: 1.4rem; margin: 0 0 4px; }
  h2 { font-size: 1.7rem; margin: 0; color: var(--cor-destaque); }
  h3 { font-size: 0.98rem; margin: 0 0 10px; color: var(--cor-destaque); }
  p.subtitulo {
    margin: 0 0 20px;
    color: #555;
    font-size: 0.9rem;
  }
  a.link-voltar {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-top: 14px;
    padding: 10px 14px;
    border: 1px solid var(--cor-destaque);
    border-radius: 8px;
    font-size: 0.85rem;
    color: var(--cor-destaque);
    text-decoration: none;
    font-weight: 600;
    transition: background 0.15s, color 0.15s;
  }
  a.link-voltar:hover { background: var(--cor-destaque); color: #fff; text-decoration: none; }

  .pagina {
    max-width: 1040px;
    margin: 0 auto;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 1px 4px rgba(20, 24, 38, 0.08);
    padding: 36px 44px;
  }

  .layout-principal { display: flex; gap: 36px; align-items: flex-start; margin-top: 8px; }

  .menu-lateral {
    flex: 0 0 190px;
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 24px;
    border-right: 1px solid var(--cor-borda);
    padding-right: 18px;
  }
  .menu-lateral-lista {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .menu-lateral button {
    font-family: inherit;
    text-align: left;
    background: none;
    border: none;
    padding: 10px 12px;
    font-size: 0.95rem;
    font-weight: 600;
    color: #667085;
    border-radius: 8px;
    cursor: pointer;
  }
  .menu-lateral button:hover { background: var(--cor-linha-alt); color: var(--cor-destaque); }
  .menu-lateral button.ativo { background: var(--cor-destaque); color: #fff; }

  .conteudo-principal { min-width: 0; flex: 1; }

  .botao-menu-mobile {
    display: none;
    position: fixed;
    right: 20px;
    bottom: 20px;
    z-index: 1100;
    align-items: center;
    gap: 8px;
    background: var(--cor-destaque);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 12px 18px;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(20, 24, 38, 0.3);
  }
  .menu-lateral-fechar { display: none; }

  .menu-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1150;
    background: rgba(15, 18, 30, 0.45);
    backdrop-filter: blur(2px);
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  .menu-backdrop.aberto { display: block; opacity: 1; }

  .menu-lateral-alca {
    display: none;
    width: 40px;
    height: 4px;
    border-radius: 999px;
    background: var(--cor-borda);
    margin: 0 auto 14px;
    flex-shrink: 0;
  }

  @media (max-width: 700px) {
    .pagina { padding: 24px 18px; }
    .layout-principal { display: block; }
    .botao-menu-mobile { display: flex; }
    .menu-lateral {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      top: auto;
      z-index: 1200;
      flex: none;
      width: 100%;
      max-width: none;
      max-height: 75vh;
      border-right: none;
      border-radius: 18px 18px 0 0;
      background: #fff;
      padding: 14px 24px 24px;
      overflow-y: auto;
      box-shadow: 0 -8px 24px rgba(20, 24, 38, 0.25);
      transform: translateY(100%);
      transition: transform 0.25s ease;
      touch-action: none;
    }
    .menu-lateral.aberto { transform: translateY(0); }
    .menu-lateral-alca { display: block; }
    .menu-lateral-fechar {
      display: block;
      margin: 0 0 12px auto;
      background: none;
      border: none;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--cor-destaque);
      cursor: pointer;
    }
  }

  .secao {
    margin-bottom: 26px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--cor-borda);
  }
  .secao:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .secao-cabecalho { margin-bottom: 22px; }
  .descricao-estado { font-size: 0.86rem; color: #555; margin: 6px 0 0; max-width: 780px; }
  .secao-nota { font-size: 0.82rem; color: #6b7280; margin: 0 0 12px; }

  .dados-gerais-grid { display: flex; flex-direction: column; }
  .dado-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    padding: 7px 0;
    border-bottom: 1px solid var(--cor-linha-alt);
  }
  .dado-item:last-child { border-bottom: none; }
  .dado-item span { font-size: 0.78rem; color: #6b7280; }
  .dado-item strong { font-size: 0.88rem; color: #111827; text-align: right; }

  table.tabela-explicacao {
    border-collapse: collapse;
    width: auto;
    font-size: 0.82rem;
    margin-top: 4px;
  }
  table.tabela-explicacao th {
    border-bottom: 2px solid var(--cor-destaque);
    color: var(--cor-destaque);
    padding: 6px 16px;
    font-weight: 700;
    text-align: center;
  }
  table.tabela-explicacao td {
    padding: 6px 16px;
    border-bottom: 1px solid var(--cor-linha-alt);
    text-align: center;
    color: #374151;
  }
  table.tabela-explicacao tbody tr:nth-child(even) { background: var(--cor-linha-alt); }

  .tabelas-lado-a-lado { display: flex; flex-wrap: wrap; justify-content: center; align-items: flex-start; gap: 28px; }

  .verbas-grid { display: flex; flex-direction: column; }

  details.secao-colapsavel > summary.secao-titulo {
    cursor: pointer;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 1.15rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: var(--cor-destaque);
    margin: 0;
  }
  details.secao-colapsavel > summary.secao-titulo::-webkit-details-marker { display: none; }
  details.secao-colapsavel > summary.secao-titulo::before {
    content: "▸";
    display: inline-block;
    font-size: 1.15rem;
    line-height: 1;
    color: var(--cor-destaque);
    transition: transform 0.15s;
  }
  details.secao-colapsavel[open] > summary.secao-titulo::before {
    transform: rotate(90deg);
  }
  details.secao-colapsavel > .secao-nota { margin-top: 10px; }
  details.secao-colapsavel > .verbas-grid,
  details.secao-colapsavel > div { margin-top: 10px; }

  .verba-card { padding: 14px 0; border-bottom: 1px solid var(--cor-linha-alt); }
  .verba-card:last-child { border-bottom: none; padding-bottom: 0; }
  .verba-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    flex-wrap: wrap;
  }
  .verba-card-header h3 { margin: 0; font-size: 0.95rem; color: #1a1f2b; }
  .verba-badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge {
    font-size: 0.66rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }
  .badge-recorrencia { background: #f1f2f4; color: #475569; }
  .verba-obs { font-size: 0.8rem; color: #1f2937; margin: 6px 0; line-height: 1.5; }
  .verba-indices { font-size: 0.8rem; color: #6b7280; margin: 6px 0; line-height: 1.5; }
  .verba-regra { font-size: 0.84rem; color: #1f2937; margin: 6px 0; line-height: 1.55; }

  .prev-bloco { padding: 12px 0; border-bottom: 1px solid var(--cor-linha-alt); }
  .prev-bloco:last-child { border-bottom: none; padding-bottom: 0; }
  .prev-bloco p { font-size: 0.83rem; margin: 6px 0 0; color: #374151; }
  .tag-ok, .tag-neutro, .tag-alerta {
    font-size: 0.66rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    margin-left: 6px;
  }
  .tag-ok { background: #e7f7ee; color: #166534; }
  .tag-neutro { background: #f1f2f4; color: #64748b; }
  .tag-alerta { background: #fef3c7; color: #92400e; white-space: nowrap; }

  .erro {
    color: #b42318;
    padding: 12px 0;
    border-bottom: 1px solid #f2b8b8;
    font-size: 0.9rem;
  }

  @media print {
    body {
      margin: 0;
      padding: 0;
      background: #fff;
    }
    .pagina {
      max-width: none;
      padding: 0;
      border-radius: 0;
      box-shadow: none;
    }
    .layout-principal {
      display: block;
      gap: 0;
    }
    .menu-lateral,
    .menu-backdrop,
    .botao-menu-mobile {
      display: none !important;
    }
  }
</style>
</head>
<body>
  <div class="pagina">
    <h1>Composição da Remuneração por Estado</h1>
    <p class="subtitulo">
      Explicação detalhada de como cada verba é calculada em cada estado: valores, índices, regras de evolução, recorrência e previdência.
    </p>

    <div class="layout-principal">
      <div class="menu-backdrop" id="menu-backdrop"></div>
      <nav class="menu-lateral" id="nav-menu-lateral">
        <div class="menu-lateral-alca" id="menu-lateral-alca"></div>
        <button type="button" class="menu-lateral-fechar" id="botao-fechar-menu-mobile">Fechar &#10005;</button>
        <div class="menu-lateral-lista" id="menu-lateral"></div>
        <a class="link-voltar" id="link-voltar-calculadora" href="./index.html">Ir para calculadora</a>
      </nav>
      <div class="conteudo-principal" id="conteudo-principal">Carregando dados...</div>
    </div>
    <button type="button" class="botao-menu-mobile" id="botao-menu-mobile">&#9776; Escolher estado</button>
  </div>

<script>
"use strict";

// Este frontend NÃO possui nenhuma regra de negócio/fórmula de cálculo.
// Todas as explicações, resumos e tabelas já vêm prontos em
// "dados-composicao.json" (gerado por gerar_dados_frontend.py). Este
// arquivo apenas lê e exibe (menu lateral, cards de verba, tabelas).

function htmlEsc(texto) {
  return String(texto ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

/** Converte marcadores de negrito (**texto**) e quebras de linha (\n) em HTML. */
function processarTexto(texto, escapar) {
  if (!texto) return "";
  let t = escapar ? htmlEsc(texto) : String(texto);
  t = t.replaceAll(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
  return t.replaceAll("\n", "<br>");
}

// ── Tabelas genéricas (colunas/linhas já formatadas pelo gerador) ──────────

function agruparEmBlocos(itens, tamanhoMax = 10) {
  const totalBlocos = Math.ceil(itens.length / tamanhoMax);
  const tamanhoBloco = Math.ceil(itens.length / totalBlocos);
  const blocos = [];
  for (let i = 0; i < itens.length; i += tamanhoBloco) {
    blocos.push(itens.slice(i, i + tamanhoBloco));
  }
  return blocos;
}

function renderTabela(tabela) {
  if (!tabela) return "";
  const { colunas, linhas } = tabela;
  const theadHtml = colunas.map(c => `<th>${htmlEsc(c)}</th>`).join("");
  const blocos = agruparEmBlocos(linhas);
  const tabelas = blocos.map(bloco => `
    <table class="tabela-explicacao">
      <thead><tr>${theadHtml}</tr></thead>
      <tbody>${bloco.map(linha => `<tr>${linha.map(v => `<td>${htmlEsc(v)}</td>`).join("")}</tr>`).join("")}</tbody>
    </table>`).join("");
  return `<div class="tabelas-lado-a-lado">${tabelas}</div>`;
}

// ── Blocos de seção ──────────────────────────────────────────────────────────

function renderVerbaCard(verba) {
  let html = `<div class="verba-card">
    <div class="verba-card-header">
      <h3>${htmlEsc(verba.nome)}</h3>
      <div class="verba-badges">
        ${verba.recorrenciaLabel ? `<span class="badge badge-recorrencia">${htmlEsc(verba.recorrenciaLabel)}</span>` : ""}
      </div>
    </div>`;
  if (verba.observacoes) html += `<p class="verba-obs">${processarTexto(verba.observacoes, true)}</p>`;
  if (verba.indices && verba.indices.length) {
    html += `<p class="verba-indices">${verba.indices.map(i => `• ${htmlEsc(i.descricao)}: ${htmlEsc(i.valor)}`).join("<br>")}</p>`;
  }
  if (verba.resumo) html += `<p class="verba-regra">${processarTexto(verba.resumo, false)}</p>`;
  if (verba.tabela) html += renderTabela(verba.tabela);
  html += `</div>`;
  return html;
}

function renderDescontos(descontos) {
  let html = `<details class="secao secao-colapsavel" open>
    <summary class="secao-titulo">Descontos</summary>
    <p class="secao-nota">Contribuições previdenciárias e imposto de renda descontados diretamente da remuneração bruta.</p>`;

  const rpps = descontos.rpps;
  if (rpps) {
    html += `<div class="prev-bloco"><strong>${htmlEsc(rpps.nome)}</strong> (${htmlEsc(rpps.tipoLabel)})`;
    if (rpps.naoDeduzIR) html += `<span class="tag-alerta">não deduz IR em folha</span>`;
    html += `<p>${htmlEsc(rpps.texto)}</p>`;
    if (rpps.tabelaFaixas) html += renderTabela(rpps.tabelaFaixas);
    html += `</div>`;
  }

  const compl = descontos.complementar;
  if (compl) {
    if (compl.disponivel) {
      html += `<div class="prev-bloco"><strong>${htmlEsc(compl.nome)}</strong> (${htmlEsc(compl.tipoLabel)})`;
      if (compl.naoDeduzIR) html += `<span class="tag-alerta">não deduz IR em folha</span>`;
      html += `<p>${htmlEsc(compl.texto)}</p></div>`;
    } else {
      html += `<div class="prev-bloco"><strong>${htmlEsc(compl.nome)}</strong><span class="tag-neutro">não disponível para esta carreira</span></div>`;
    }
  }

  const ir = descontos.ir;
  html += `<div class="prev-bloco"><strong>Imposto de Renda (IRRF)</strong>
    <p>${htmlEsc(ir.texto)}</p>
    ${renderTabela(ir.tabelaFaixas)}
  </div>`;

  html += `</details>`;
  return html;
}

function formatarAnosServico(valor) {
  if (valor == null) return "-";
  return `${new Intl.NumberFormat("pt-BR").format(valor)} ${valor === 1 ? "ano" : "anos"}`;
}

function renderProgressaoCarreira(niveis) {
  if (!niveis || !niveis.length) return "";
  const tabela = {
    colunas: ["Nível", "Tempo estimado"],
    linhas: niveis.map(n => [n.referencia, formatarAnosServico(n.anosNoServico)]),
  };
  return `<details class="secao secao-colapsavel" open>
    <summary class="secao-titulo">Progressão na carreira</summary>
    <p class="secao-nota">Tempo de serviço esperado para alcançar cada referência da carreira. O tempo real de progressão pode variar de servidor para servidor, de acordo com os critérios específicos de cada estado (avaliações de desempenho, interstícios mínimos, entre outros).</p>
    ${renderTabela(tabela)}
  </details>`;
}

function renderDadosGerais(dadosGerais) {
  const FORMATADOR_BRL = new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" });
  return `<details class="secao secao-colapsavel" open>
    <summary class="secao-titulo">Dados gerais</summary>
    <div class="dados-gerais-grid">
      <div class="dado-item"><span>Teto salarial</span><strong>${FORMATADOR_BRL.format(dadosGerais.tetoSalarial || 0)}</strong></div>
      ${dadosGerais.cargaHorariaSemanal ? `<div class="dado-item"><span>Carga horária semanal</span><strong>${dadosGerais.cargaHorariaSemanal}h</strong></div>` : ""}
      ${(dadosGerais.indices || []).map(i => `<div class="dado-item"><span>${htmlEsc(i.descricao)}</span><strong>${htmlEsc(i.valor)}</strong></div>`).join("")}
      ${dadosGerais.ultimaAtualizacao ? `<div class="dado-item"><span>Atualizado em</span><strong>${dadosGerais.ultimaAtualizacao.split("-").reverse().join("/")}</strong></div>` : ""}
    </div>
  </details>`;
}

function renderComposicao(composicao) {
  let html = `<div class="secao secao-cabecalho">
    <h2>${htmlEsc(composicao.nome)}</h2>
    ${composicao.descricao ? `<p class="descricao-estado">${htmlEsc(composicao.descricao)}</p>` : ""}
  </div>`;

  html += renderDadosGerais(composicao.dadosGerais);
  html += renderProgressaoCarreira(composicao.progressaoCarreira);

  html += `<details class="secao secao-colapsavel" open>
    <summary class="secao-titulo">Verbas remuneratórias</summary>
    <p class="secao-nota">Entram na base de cálculo do Imposto de Renda e do teto constitucional.</p>
    <div class="verbas-grid">${composicao.verbasRemuneratorias.map(renderVerbaCard).join("")}</div>
  </details>`;

  if (composicao.verbasIndenizatorias.length) {
    html += `<details class="secao secao-colapsavel" open>
      <summary class="secao-titulo">Verbas indenizatórias</summary>
      <p class="secao-nota">Não entram na base de cálculo do Imposto de Renda nem do teto constitucional.</p>
      <div class="verbas-grid">${composicao.verbasIndenizatorias.map(renderVerbaCard).join("")}</div>
    </details>`;
  }

  html += renderDescontos(composicao.descontos);

  return html;
}

// ── Orquestração ──────────────────────────────────────────────────────────────

let __ufAtiva = null;

const __navMenuLateral = document.getElementById("nav-menu-lateral");
const __menuBackdrop = document.getElementById("menu-backdrop");

function abrirMenuMobile() {
  __navMenuLateral.classList.add("aberto");
  __menuBackdrop.classList.add("aberto");
}
function fecharMenuMobile() {
  __navMenuLateral.classList.remove("aberto");
  __menuBackdrop.classList.remove("aberto");
}

document.getElementById("botao-menu-mobile").addEventListener("click", abrirMenuMobile);
document.getElementById("botao-fechar-menu-mobile").addEventListener("click", fecharMenuMobile);
__menuBackdrop.addEventListener("click", fecharMenuMobile);

// Gesto de arrastar para baixo (touch) para fechar o menu mobile
(function () {
  let inicioY = null;
  let deslocamentoY = 0;
  __navMenuLateral.addEventListener("touchstart", (ev) => {
    inicioY = ev.touches[0].clientY;
    deslocamentoY = 0;
    __navMenuLateral.style.transition = "none";
  });
  __navMenuLateral.addEventListener("touchmove", (ev) => {
    if (inicioY === null) return;
    deslocamentoY = Math.max(0, ev.touches[0].clientY - inicioY);
    __navMenuLateral.style.transform = `translateY(${deslocamentoY}px)`;
  });
  __navMenuLateral.addEventListener("touchend", () => {
    __navMenuLateral.style.transition = "";
    __navMenuLateral.style.transform = "";
    if (deslocamentoY > 80) fecharMenuMobile();
    inicioY = null;
    deslocamentoY = 0;
  });
})();

function montarMenuLateral(dados) {
  const menu = document.getElementById("menu-lateral");
  if (!menu.dataset.montado) {
    const ufsOrdenadas = [...dados.listaEstados].sort((a, b) => a.nome.localeCompare(b.nome, "pt-BR"));
    menu.innerHTML = ufsOrdenadas.map(({ uf, nome }) =>
      `<button type="button" data-uf="${uf}">${htmlEsc(nome)}</button>`).join("");
    menu.addEventListener("click", (ev) => {
      const botao = ev.target.closest("button[data-uf]");
      if (!botao) return;
      __ufAtiva = botao.dataset.uf;
      renderizarTudo(dados);
      fecharMenuMobile();
      window.scrollTo({ top: 0, behavior: "instant" });
    });
    menu.dataset.montado = "1";
  }
  menu.querySelectorAll("button[data-uf]").forEach(botao => {
    botao.classList.toggle("ativo", botao.dataset.uf === __ufAtiva);
  });
}

function renderizarTudo(dados) {
  montarMenuLateral(dados);
  const composicao = dados.composicao[__ufAtiva];
  if (!composicao) return;
  const linkVoltar = document.getElementById("link-voltar-calculadora");
  if (linkVoltar) {
    linkVoltar.href = `./index.html?estado=${encodeURIComponent(__ufAtiva)}`;
  }
  document.getElementById("conteudo-principal").innerHTML = renderComposicao(composicao);
}

async function carregarDados() {
  try {
    const resposta = await fetch("./dados-composicao.json", { cache: "no-store" });
    if (!resposta.ok) throw new Error(`HTTP ${resposta.status}`);
    window.__dados = await resposta.json();
  } catch (erro) {
    document.getElementById("conteudo-principal").innerHTML =
      `<div class="erro">Não foi possível carregar os dados.<br>
      Abra este arquivo a partir de um servidor local (ex.: <code>python servidor.py</code>).<br>
      Detalhe: ${erro.message}</div>`;
    return;
  }
  const ufsDisponiveis = window.__dados.listaEstados.map(e => e.uf);
  const ufNaUrl = (new URLSearchParams(window.location.search).get("estado") || "").toUpperCase();
  __ufAtiva = ufsDisponiveis.includes(ufNaUrl) ? ufNaUrl : ufsDisponiveis[0];
  renderizarTudo(window.__dados);
}

carregarDados();
</script>
